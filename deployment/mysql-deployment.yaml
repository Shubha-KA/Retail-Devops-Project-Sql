apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: capsule-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        envFrom:
        - configMapRef:
            name: retail-config
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: capsule-ns
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
